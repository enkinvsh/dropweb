name: build-linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
          flutter-version: 3.41.6

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: dart run setup.dart linux --arch amd64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dropweb-linux-amd64
          path: dist/
