name: build

on:
  push:
    tags:
      - "v*"
env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
            arch: amd64
          - platform: macos
            os: macos-latest
            arch: arm64
          - platform: linux
            os: ubuntu-24.04
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: startsWith(matrix.platform,'android')
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Configure CI code signing (macOS)
        if: matrix.platform == 'macos'
        run: |
          echo 'CODE_SIGN_IDENTITY = -' > macos/Runner/Configs/Local.xcconfig

      - name: Select latest stable Xcode (macOS)
        if: matrix.platform == 'macos'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
          flutter-version: 3.41.6

      - name: Get Flutter Dependency
        run: flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  changelog:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: ${{ env.IS_STABLE == 'true' }}
        with:
          fetch-depth: 0
          ref: refs/heads/main
      - name: Generate
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          tags=($(git tag --merged $(git rev-parse HEAD) --sort=-creatordate))
          preTag=$(grep -oP '^## \K.*' CHANGELOG.md | head -n 1)
          currentTag=""
          for ((i = 0; i <= ${#tags[@]}; i++)); do
            if (( i < ${#tags[@]} )); then
              tag=${tags[$i]}
            else
              tag=""
            fi
            if [ -n "$currentTag" ]; then
              if [ "$(echo -e "$currentTag\n$preTag" | sort -V | head -n 1)" == "$currentTag" ]; then
                break
              fi
            fi
            if [ -n "$currentTag" ]; then
              echo "## $currentTag" >> NEW_CHANGELOG.md
              echo "" >> NEW_CHANGELOG.md
              if [ -n "$tag" ]; then
                git log --pretty=format:"%B" "$tag..$currentTag" | awk 'NF {print "- " $0} !NF {print ""}' >> NEW_CHANGELOG.md
              else
                git log --pretty=format:"%B" "$currentTag" | awk 'NF {print "- " $0} !NF {print ""}' >> NEW_CHANGELOG.md
              fi
              echo "" >> NEW_CHANGELOG.md
            fi
            currentTag=$tag
          done
          cat CHANGELOG.md >> NEW_CHANGELOG.md
          cat NEW_CHANGELOG.md > CHANGELOG.md

      - name: Commit
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            echo "Commit pushing"
            git config --local user.email "ci@dropweb.org"
            git config --local user.name "dropweb-ci"
            git commit -m "Update changelog"
            git push
            if [ $? -eq 0 ]; then
              echo "Push succeeded"
            else
              echo "Push failed"
              exit 1
            fi
          fi

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    permissions: write-all
    needs: [build]
    if: always() && (needs.build.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')

          # Template first
          if [ "${{ env.IS_STABLE }}" == "true" ]; then
            sed "s|VERSION|$version|g" ./.github/release_template.md > release.md
          else
            sed "s|VERSION|$version|g" ./.github/pre_release_template.md > release.md
          fi

          # Find previous tag
          if [ "${{ env.IS_STABLE }}" == "true" ]; then
            preTag=$(curl --silent "https://api.github.com/repos/${{ github.repository }}/releases/latest" | grep -Po '"tag_name": "\K.*?(?=")' || echo "")
          else
            preTag=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1)
          fi

          # Append compact changelog (subject lines only)
          echo "" >> release.md
          echo "## Коммиты" >> release.md
          echo "" >> release.md
          if [ -n "$preTag" ]; then
            git log --pretty=format:"- %s" "$preTag..${{ github.ref_name }}" >> release.md
          else
            git log --pretty=format:"- %s" "${{ github.ref_name }}" -20 >> release.md
          fi
          echo "" >> release.md

      - name: Generate sha256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Release (Stable)
        if: ${{ env.IS_STABLE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: "./release.md"
          prerelease: false

      - name: Release (Pre-release)
        if: ${{ env.IS_STABLE != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: "./release.md"
          prerelease: true

      - name: Publish to YC update server (stable only)
        if: ${{ env.IS_STABLE == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"; version="${tag#v}"
          build=$(grep '^version:' pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          ep="--endpoint-url=https://storage.yandexcloud.net"
          B="s3://dropweb-downloads"
          for f in dropweb-arm64-v8a.apk dropweb-universal.apk dropweb-amd64-setup.exe dropweb-arm64.dmg dropweb-amd64.AppImage; do
            if [ -f "./dist/$f" ]; then
              aws s3 cp "./dist/$f" "$B/v$version/$f" $ep
              aws s3 cp "./dist/$f" "$B/latest/$f" $ep
            else
              echo "WARN: ./dist/$f not found, skipping"
            fi
          done
          base="https://storage.yandexcloud.net/dropweb-downloads/latest"
          notes_raw=$(grep '^- ' release.md | head -3 | sed 's/^- //' || true)
          [ -z "$notes_raw" ] && notes_raw="Релиз $version"
          notes_json=$(printf '%s\n' "$notes_raw" | jq -R . | jq -s .)
          jq -n --arg version "$version" --argjson build "${build:-0}" --arg pubDate "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --argjson notes "$notes_json" \
            --arg apk "$base/dropweb-arm64-v8a.apk" --arg universal "$base/dropweb-universal.apk" --arg exe "$base/dropweb-amd64-setup.exe" --arg dmg "$base/dropweb-arm64.dmg" --arg appimage "$base/dropweb-amd64.AppImage" \
            '{version:$version,build:$build,mandatory:false,minSupported:"0.7.0",pubDate:$pubDate,notes:$notes,platforms:{"android-arm64":{url:$apk},"android-universal":{url:$universal},"windows-amd64":{url:$exe},"windows-arm64":{url:""},"linux-amd64":{url:$appimage},"linux-arm64":{url:""},"macos":{url:$dmg},"ios":{url:""}}}' > update.json
          aws s3 cp update.json "$B/update.json" $ep --content-type application/json --cache-control no-cache
          echo "Published v$version binaries + manifest to YC (dropweb-downloads)."

      - name: Prepare commit list for notification
        id: prepare_commits
        run: |
          # Extract first 10 commits from release.md (without the template footer)
          commits=$(head -n 20 release.md | grep "^- " | head -n 10)
          # Escape special characters for JSON
          commits_escaped=$(echo "$commits" | jq -Rs .)
          echo "commits=$commits_escaped" >> $GITHUB_OUTPUT

      # TG notifications disabled pending rebrand of notify_telegram.py
      # (currently posts as "FlClashX Stable/PreRelease Version" — stale fork
      # copy). Re-enable after script is rebranded + channel IDs audited.
      # To re-enable: set `if: success()`.
      - name: Send Telegram notifications
        continue-on-error: true
        if: false
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID_1: ${{ secrets.TELEGRAM_CHANNEL_ID_1 }}
          TELEGRAM_CHANNEL_ID_2: ${{ secrets.TELEGRAM_CHANNEL_ID_2 }}
          TELEGRAM_CHANNEL_ID_3: ${{ secrets.TELEGRAM_CHANNEL_ID_3 }}
          VERSION: ${{ github.ref_name }}
          COMMITS: ${{ fromJSON(steps.prepare_commits.outputs.commits) }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          IS_STABLE: ${{ env.IS_STABLE }}
        run: |
          python3 -m pip install requests --quiet
          python3 .github/scripts/notify_telegram.py
